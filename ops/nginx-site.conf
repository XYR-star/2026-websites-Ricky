server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/heyrickishere.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heyrickishere.com/privkey.pem;

    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name heyrickishere.com;

    return 301 https://www.heyrickishere.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.heyrickishere.com;

    return 301 https://www.heyrickishere.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name heyrickishere.com;

    ssl_certificate /etc/letsencrypt/live/heyrickishere.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heyrickishere.com/privkey.pem;

    return 301 https://www.heyrickishere.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.heyrickishere.com;

    root /var/www/ricky-site;
    index index.html;
    client_max_body_size 16m;

    ssl_certificate /etc/letsencrypt/live/heyrickishere.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heyrickishere.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /admin/ {
        proxy_pass http://127.0.0.1:4322;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location = /admin {
        proxy_pass http://127.0.0.1:4322;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location /api/admin/ {
        proxy_pass http://127.0.0.1:4322;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /rss.xml {
        add_header Content-Type application/rss+xml;
    }
}
